target-version = "py312"
line-length = 100

# Fixture/owned subject code is intentionally varied (and sometimes buggy);
# it is the agent's input, not project code, so it is not linted.
extend-exclude = ["forgejudge/golden/fixtures", "golden/owned"]

[lint]
select = ["E", "F", "I", "UP", "B", "C4", "SIM"]
ignore = ["E501"]  # line length handled by formatter; long strings/URLs allowed

[lint.per-file-ignores]
"tests/*" = ["B011"]
