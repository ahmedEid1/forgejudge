<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="ForgeJudge">
  <rect width="32" height="32" rx="7" fill="#0b0f14"/>
  <rect x="1" y="1" width="30" height="30" rx="6" fill="none" stroke="#243140" stroke-width="1"/>
  <!-- balance beam (judge) -->
  <g stroke="#4cc2ff" stroke-width="2" stroke-linecap="round" fill="none">
    <line x1="16" y1="7" x2="16" y2="25"/>
    <line x1="8" y1="11" x2="24" y2="11"/>
  </g>
  <!-- pans -->
  <path d="M5 11 L11 11 L8 17 Z" fill="#131a22" stroke="#4cc2ff" stroke-width="1.4" stroke-linejoin="round"/>
  <path d="M21 11 L27 11 L24 17 Z" fill="#131a22" stroke="#3fb950" stroke-width="1.4" stroke-linejoin="round"/>
  <!-- base -->
