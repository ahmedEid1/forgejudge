instance_id: fixture-base-convert-001
family: make_ci_green
problem_statement: |
  `to_base(10, 2)` returns "0101" but ten in binary is "1010". The base-N
  renderer prints its digits in the wrong order: the output is reversed, so
  the least-significant digit ends up first. Any multi-digit result is
  affected (e.g. `to_base(123, 10)` yields "321") and the round-trip
  `from_base(to_base(n, b), b) == n` fails for those values. Single-digit
  results and `from_base` itself are unaffected.
source_license: own
created_at: "2026-05-30"
env_image: "python:3.12-slim"
fail_to_pass:
  - "test_baseconv_bug.py::test_ten_in_binary_is_most_significant_first"
  - "test_baseconv_bug.py::test_decimal_multi_digit_order"
  - "test_baseconv_bug.py::test_hex_multi_digit_order"
  - "test_baseconv_bug.py::test_round_trip_to_then_from"
  - "test_baseconv_bug.py::test_round_trip_three_digit_binary"
pass_to_pass:
  - "test_baseconv.py::test_zero"
  - "test_baseconv.py::test_single_digit_outputs"
  - "test_baseconv.py::test_from_base_basic"
  - "test_baseconv.py::test_from_base_round_trips_known_strings"
  - "test_baseconv.py::test_invalid_base_rejected"
