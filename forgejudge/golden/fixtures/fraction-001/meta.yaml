instance_id: fixture-fraction-001
family: make_ci_green
problem_statement: |
  `reduce(1, -2)` returns `(1, -2)`, but a fraction with a negative denominator
  should be normalized so the denominator is positive and the sign rides on the
  numerator: the expected result is `(-1, 2)`. The same happens for any negative
  denominator -- `reduce(6, -9)` returns `(2, -3)` instead of `(-2, 3)`, and
  `reduce(-2, -4)` returns `(-2, -3)`-style negatives instead of `(1, 2)`. The
  magnitude is reduced correctly; only the sign normalization is wrong, leaving
  the denominator negative whenever the input denominator is negative.
source_license: own
created_at: "2026-05-30"
env_image: "python:3.12-slim"
fail_to_pass:
  - "test_fraction_bug.py::test_negative_denominator_moves_sign_to_numerator"
  - "test_fraction_bug.py::test_negative_denominator_with_reduction"
  - "test_fraction_bug.py::test_both_negative_is_positive"
  - "test_fraction_bug.py::test_negative_denominator_unit_numerator"
  - "test_fraction_bug.py::test_denominator_always_positive"
  - "test_fraction_bug.py::test_zero_numerator_negative_denominator"
