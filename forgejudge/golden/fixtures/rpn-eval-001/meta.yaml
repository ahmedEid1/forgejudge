instance_id: fixture-rpn-eval-001
family: make_ci_green
problem_statement: |
  The RPN evaluator is documented to use true (float) division, but division
  silently drops the fractional part of its result. `evaluate("7 2 /")` returns
  3.0 instead of 3.5, and `evaluate("1 4 /")` returns 0.0 instead of 0.25.
  Whenever the dividend is not an exact multiple of the divisor the answer is
  truncated toward zero. Exact divisions (e.g. "8 2 /") and the other operators
  (+, -, *) are unaffected.
source_license: own
created_at: "2026-05-30"
env_image: "python:3.12-slim"
fail_to_pass:
  - "test_rpn_bug.py::test_division_is_true_division"
  - "test_rpn_bug.py::test_division_fraction_below_one"
  - "test_rpn_bug.py::test_division_keeps_fractional_part"
  - "test_rpn_bug.py::test_mixed_expression_with_division"
pass_to_pass:
  - "test_rpn.py::test_single_number"
  - "test_rpn.py::test_addition"
  - "test_rpn.py::test_multiplication"
  - "test_rpn.py::test_subtraction"
  - "test_rpn.py::test_exact_division"
  - "test_rpn.py::test_chained_commutative"
  - "test_rpn.py::test_not_enough_operands"
  - "test_rpn.py::test_invalid_token"
