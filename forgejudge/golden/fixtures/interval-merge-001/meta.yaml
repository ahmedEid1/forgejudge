instance_id: fixture-interval-merge-001
family: make_ci_green
problem_statement: |
  `merge([(1, 3), (3, 5)])` returns `[(1, 3), (3, 5)]` but should return
  `[(1, 5)]`. Closed intervals that touch at a shared endpoint are left as two
  separate intervals instead of being combined into one. Genuinely disjoint
  intervals (with a gap between them) must still be kept separate.
source_license: own
created_at: "2026-05-29"
env_image: "python:3.12-slim"
fail_to_pass:
  - "test_intervals_bug.py::test_touching_intervals_merge"
  - "test_intervals_bug.py::test_chain_of_touching_intervals"
  - "test_intervals_bug.py::test_touching_then_gap"
  - "test_intervals_bug.py::test_touching_unsorted"
pass_to_pass:
  - "test_intervals.py::test_empty"
  - "test_intervals.py::test_single"
  - "test_intervals.py::test_disjoint_kept_separate"
  - "test_intervals.py::test_strict_overlap_merges"
  - "test_intervals.py::test_contained_interval"
  - "test_intervals.py::test_unsorted_input"
