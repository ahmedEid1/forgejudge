instance_id: fixture-lru-cache-001
family: make_ci_green
problem_statement: |
  After reading a key with `get`, that key is still evicted as if it had never
  been touched. With capacity 2, `put('a',1); put('b',2); get('a'); put('c',3)`
  evicts 'a' even though 'a' was just read more recently than 'b'. Reads do not
  count toward recency the way writes do.
source_license: own
created_at: "2026-05-29"
env_image: "python:3.12-slim"
fail_to_pass:
  - "test_lru_cache_bug.py::test_get_refreshes_recency"
  - "test_lru_cache_bug.py::test_get_moves_key_to_end"
pass_to_pass:
  - "test_lru_cache.py::test_get_and_put"
  - "test_lru_cache.py::test_missing_returns_default"
  - "test_lru_cache.py::test_evicts_when_over_capacity"
  - "test_lru_cache.py::test_put_updates_recency"
