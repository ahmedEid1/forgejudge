instance_id: fixture-lru-cache-001
family: make_ci_green
problem_statement: |
  The cache evicts one entry too early, so it never actually holds its full
  capacity. With capacity 2, `put('a',1); put('b',2)` leaves only 'b' — 'a' is
  dropped even though the cache should comfortably hold both. A capacity-N cache
  tops out at N-1 live entries. The eviction is triggered one insert sooner than
  it should be.
source_license: own
created_at: "2026-05-30"
env_image: "python:3.12-slim"
fail_to_pass:
  - "test_lru_cache_bug.py::test_holds_both_at_capacity"
  - "test_lru_cache_bug.py::test_keeps_two_most_recent"
  - "test_lru_cache_bug.py::test_get_refreshes_recency_at_capacity"
pass_to_pass:
  - "test_lru_cache.py::test_get_and_put"
  - "test_lru_cache.py::test_missing_returns_default"
  - "test_lru_cache.py::test_overwrite_existing_under_capacity"
