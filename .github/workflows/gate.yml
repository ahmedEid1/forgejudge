name: gate

# Harness-integrity gate (spec decision #12). On every PR we re-grade the gold
# patches across shards (deterministic, $0 — no LLM). Because gold grading is
# DETERMINISTIC, the per-shard rates are a partition of ONE run, NOT noisy
# per-seed samples — so we pool every shard record and require an EXACT 12/12
# resolution via `gate --mode exact` (findings #2/#4). Any partial breakage
# (e.g. 1 of 12 gold tasks stops resolving) fails the build. The stochastic
# multi-seed CI gate (regression_gate vs baseline_scores.json) is reserved for
# the scheduled sweep, where each sample is a genuine per-SEED rerun.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grade-gold:
    name: grade gold shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv sync
      - name: Grade gold shard
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          uv run python -m forgejudge.harness.runner_actions \
            --patch-source gold --model gold \
            --shard "${SHARD}" --num-shards 4 --out "runs-shard-${SHARD}.jsonl"
      - uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: gate-runs-shard-${{ matrix.shard }}
          path: runs-shard-${{ matrix.shard }}.jsonl
          if-no-files-found: error

  gate:
    name: gold integrity gate
    needs: grade-gold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
      - uses: astral-sh/setup-uv@d4b2f3b6ecc6e67c4457f6d3e41ec42d3d0fcb86 # v5.4.2
        with:
          enable-cache: true
      - run: uv sync
      - uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
        with:
          path: artifacts
      - name: Apply deterministic gold integrity gate (exact 12/12, zero tolerance)
        # Pool ALL shard records into one resolution rate and require it == 1.0.
        # The shards partition one deterministic run, so a CI over them is the
        # wrong variance axis (findings #2/#4); --mode exact fails on any miss.
        run: |
          uv run python -m forgejudge.eval.gate \
            --mode exact \
            --candidate-runs artifacts
