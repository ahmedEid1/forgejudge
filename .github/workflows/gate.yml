name: gate

# Harness-integrity gate (spec decision #12). On every PR we re-grade the gold
# patches across shards (deterministic, $0 — no LLM). Because gold grading is
# DETERMINISTIC, the per-shard rates are a partition of ONE run, NOT noisy
# per-seed samples — so we pool every shard record and require that EVERY gold
# task resolves (rate == 1.0) via `gate --mode exact` (findings #2/#4). Any
# partial breakage (even one gold task stops resolving) fails the build. The stochastic
# multi-seed CI gate (regression_gate vs baseline_scores.json) is reserved for
# the scheduled sweep, where each sample is a genuine per-SEED rerun.

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grade-gold:
    name: grade gold shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync
      - name: Grade gold shard
        env:
          SHARD: ${{ matrix.shard }}
        run: |
          uv run python -m forgejudge.harness.runner_actions \
            --patch-source gold --model gold \
            --shard "${SHARD}" --num-shards 4 --out "runs-shard-${SHARD}.jsonl"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: gate-runs-shard-${{ matrix.shard }}
          path: runs-shard-${{ matrix.shard }}.jsonl
          if-no-files-found: error

  gate:
    name: gold integrity gate
    needs: grade-gold
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Apply deterministic gold integrity gate (exact, all gold tasks, zero tolerance)
        # Pool ALL shard records into one resolution rate and require it == 1.0.
        # The shards partition one deterministic run, so a CI over them is the
        # wrong variance axis (findings #2/#4); --mode exact fails on any miss.
        run: |
          uv run python -m forgejudge.eval.gate \
            --mode exact \
            --candidate-runs artifacts
