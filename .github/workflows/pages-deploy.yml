name: pages-deploy

# Deploy the static dashboard to Cloudflare Pages whenever its published assets
# change on main. Before this, a dashboard / methodology / OG-card HTML edit only
# went live on the next nightly `sweep` run — so a copy fix could sit stale for a
# day. This pushes the site within minutes of the merge, independent of the sweep.
#
# Only `dashboard/public/**` changes trigger it (the deployed root); other edits
# don't need a redeploy. The nightly sweep still deploys after refreshing the
# leaderboard data, so the two are complementary, not racing.

on:
  push:
    branches: [main]
    paths:
      - "dashboard/public/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    name: deploy dashboard → Cloudflare Pages
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Deploy dashboard/public to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          npx -y wrangler@4 pages deploy dashboard/public \
            --project-name forgejudge --branch main --commit-dirty=true
