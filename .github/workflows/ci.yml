name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Pytest (fast unit)
        run: uv run pytest -m "not slow" -q

      - name: Golden-set validation (slow — runs pytest per task)
        run: uv run pytest -m "slow and not swebench" -q

  swebench-equivalence:
    name: swebench grading equivalence
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - name: Sync with official swebench grading
        run: uv sync --extra harness
      - name: Verify the harness extra installed (fail loud, never skip silently)
        # The only swebench-marked module gates its imports behind
        # importorskip("swebench"); if the extra failed to install the module is
        # SKIPPED and `pytest -m swebench` exits 0 having run ZERO checks. A hard
        # import here turns a missing extra into a visible job failure (#1).
        run: uv run python -c "import swebench"
      - name: Verify our verdict == swebench get_resolution_status
        run: uv run pytest -m swebench -q

  db-tests:
    name: run store (pgvector)
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg17
        env:
          POSTGRES_USER: forgejudge
          POSTGRES_PASSWORD: forgejudge
          POSTGRES_DB: forgejudge
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U forgejudge"
          --health-interval 5s --health-timeout 5s --health-retries 15
    env:
      FJ_LOCAL_DATABASE_URL: postgresql://forgejudge:forgejudge@localhost:5432/forgejudge
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync
      - name: Run store + DB-backed tests
        run: uv run pytest -m db -q

  mcp-server:
    name: MCP server (fastmcp)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --extra mcp
      - name: Verify the mcp extra installed (fail loud, never skip silently)
        # tests/mcp/test_server.py gates on importorskip("fastmcp"); without this
        # hard import a failed extra install would skip the module and pass green
        # with zero mcp tests run (#1).
        run: uv run python -c "import fastmcp"
      - name: MCP tool + manifest tests
        run: uv run pytest -m mcp -q

  playground:
    name: guarded playground (fastapi)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0
        with:
          enable-cache: true
      - run: uv sync --extra playground
      - name: Verify the playground extra installed (fail loud, never skip silently)
        # tests/playground_api/test_guard.py gates on importorskip("fastapi");
        # without this hard import a failed extra install would skip the module
        # and pass green with zero playground tests run (#1).
        run: uv run python -c "import fastapi"
      - name: Playground guard tests
        run: uv run pytest -m playground -q
