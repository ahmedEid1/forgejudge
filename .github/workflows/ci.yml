name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-test:
    name: lint + unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync

      - name: Ruff (lint)
        run: uv run ruff check

      - name: Pytest (fast unit)
        run: uv run pytest -m "not slow" -q

      - name: Golden-set validation (slow — runs pytest per task)
        run: uv run pytest -m slow -q
