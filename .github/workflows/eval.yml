name: eval

# Sandbox grade executor: shards the golden set across ephemeral, isolated VMs
# (the GitHub Actions public-runner VM is the sandbox boundary — see DESIGN $0
# insight). Phase 2 grades the GOLD patches as an end-to-end harness self-test;
# the Phase 5 sweep feeds the agent's patches.

on:
  workflow_dispatch:
    inputs:
      patch_source:
        description: "Which patches to grade"
        type: choice
        options: [gold, empty]
        default: gold
  repository_dispatch:
    types: [forgejudge-eval]

permissions:
  contents: read

concurrency:
  group: eval-${{ github.ref }}
  cancel-in-progress: true

jobs:
  grade:
    name: grade shard ${{ matrix.shard }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        shard: [0, 1, 2, 3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0

      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true

      - run: uv sync

      - name: Grade shard
        env:
          # Untrusted event input is read via env (never interpolated into the
          # shell) and validated by argparse choices=[gold, empty].
          PATCH_SOURCE: ${{ github.event.inputs.patch_source || github.event.client_payload.patch_source || 'gold' }}
          SHARD: ${{ matrix.shard }}
        run: |
          uv run python -m forgejudge.harness.runner_actions \
            --patch-source "${PATCH_SOURCE:-gold}" \
            --model "${PATCH_SOURCE:-gold}" \
            --shard "${SHARD}" --num-shards 4 \
            --out "runs-shard-${SHARD}.jsonl"

      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runs-shard-${{ matrix.shard }}
          path: runs-shard-${{ matrix.shard }}.jsonl
          if-no-files-found: error

  summary:
    name: aggregate
    needs: grade
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          enable-cache: true
      - run: uv sync
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          path: artifacts
      - name: Aggregate run records
        run: |
          # pipefail so the runner's non-zero exit on a gold self-test failure
          # propagates through `tee` (which otherwise exits 0) and reds the job
          # (finding #36). The runner exits 1 when a gold run leaves any task
          # unresolved.
          set -o pipefail
          uv run python -m forgejudge.harness.runner_actions --aggregate artifacts --out runs-all.jsonl | tee summary.txt
          echo "### ForgeJudge eval" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          cat summary.txt >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: runs-all
          path: runs-all.jsonl
