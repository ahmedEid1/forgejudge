name: publish-mcp

# Publish the ForgeJudge MCP server to the official registry via GitHub OIDC
# (no interactive device-flow auth). The io.github.ahmedeid1 namespace is
# authorized by this repo's OIDC identity.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3

      - name: Install mcp-publisher (checksum-verified before sudo-install)
        env:
          # Pinned digest of the v1.7.9 linux/amd64 release asset, cross-checked
          # against the release's registry_1.7.9_checksums.txt. Download to a file
          # and verify the SHA256 BEFORE extracting/installing so a tampered asset
          # or a MITM cannot run an attacker-controlled binary in this
          # OIDC-token-minting job (finding #16).
          MCP_PUBLISHER_VERSION: v1.7.9
          MCP_PUBLISHER_SHA256: ab128162b0616090b47cf245afe0a23f3ef08936fdce19074f5ba0a4469281ac
        run: |
          set -euo pipefail
          curl -fsSL -o mcp-publisher.tar.gz \
            "https://github.com/modelcontextprotocol/registry/releases/download/${MCP_PUBLISHER_VERSION}/mcp-publisher_linux_amd64.tar.gz"
          echo "${MCP_PUBLISHER_SHA256}  mcp-publisher.tar.gz" | sha256sum -c -
          tar -xzf mcp-publisher.tar.gz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --version

      - name: Login (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish
        working-directory: forgejudge/mcp
        run: mcp-publisher publish
