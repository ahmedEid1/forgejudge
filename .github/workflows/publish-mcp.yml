name: publish-mcp

# Publish the ForgeJudge MCP server to the official registry via GitHub OIDC
# (no interactive device-flow auth). The io.github.ahmedeid1 namespace is
# authorized by this repo's OIDC identity.

on:
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install mcp-publisher
        run: |
          curl -fsSL https://github.com/modelcontextprotocol/registry/releases/download/v1.7.9/mcp-publisher_linux_amd64.tar.gz \
            | tar -xz mcp-publisher
          sudo mv mcp-publisher /usr/local/bin/mcp-publisher
          mcp-publisher --version || true

      - name: Login (GitHub OIDC)
        run: mcp-publisher login github-oidc

      - name: Publish
        working-directory: forgejudge/mcp
        run: mcp-publisher publish
